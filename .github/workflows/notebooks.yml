name: Notebooks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  run-notebooks:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install music-box with tutorial dependencies
        run: |
          python -m pip install --upgrade pip
          pip install '.[tutorial]' nbmake ipykernel

      - name: Execute tutorial notebooks
        run: |
          # gpu_solver needs a CUDA-enabled musica build and GPU hardware,
          # which aren't available on this runner.
          pytest --nbmake --nbmake-timeout=900 --nbmake-kernel=python3 -v tutorials/ \
            --ignore-glob='*.ipynb_checkpoints*' \
            --ignore-glob='*gpu_solver*'
